name: krew-recruiter-app
services:
- name: krew-recruter
  build_command: npm install && npm run build
  run_command: npm start
  environment_slug: node-js
  instance_size_slug: apps-s-1vcpu-1gb
  instance_count: 1
  http_port: 8080
  routes:
  - path: /
  envs:
  - key: PORT
    value: "8080"
    scope: RUN_TIME
  # Canonical public URL of the deployed app. Used by server-side code that
  # builds outbound links — most notably the Meta ads service which embeds
  # the apply URL in ad creatives. Was previously relying on the hardcoded
  # fallback in server/routes.ts; promoted here so it's explicit and
  # version-controlled. Update this if the production domain ever changes.
  - key: PUBLIC_URL
    value: "https://krewrecruiter.com"
    scope: RUN_TIME
  # ─── DigitalOcean Spaces (object storage) ───────────────────────
  # Required for ALL photo and file uploads. Without these, every
  # upload endpoint returns 503 "File uploads are not configured".
  # See server/services/objectStorage.ts for the provisioning
  # checklist (create Space, generate API key, set CORS).
  #
  # KEY and SECRET must be set in the DO dashboard under
  # Settings → Components → krew-recruter → Environment Variables.
  # DO_SPACES_SECRET should be marked encrypted.
  #
  # Bucket and region are committed here because they're not secret
  # (they appear in every public URL the app serves).
  - key: DO_SPACES_KEY
    value: "set-in-do-dashboard"
    scope: RUN_TIME
  - key: DO_SPACES_SECRET
    value: "set-in-do-dashboard"
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_BUCKET
    value: "krew-recruiter"
    scope: RUN_TIME
  - key: DO_SPACES_REGION
    value: "nyc3"
    scope: RUN_TIME
  # Optional: CDN endpoint for faster public file delivery. Format:
  # https://<cdn-id>.cdn.digitaloceanspaces.com (find in the Space
  # settings after enabling CDN). Leave blank to use the direct
  # Spaces hostname.
  - key: DO_SPACES_CDN_ENDPOINT
    value: ""
    scope: RUN_TIME
  - key: npm_config_prefix
    value: ""
    scope: BUILD_TIME
  - key: HOME
    value: /workspace
    scope: BUILD_TIME
