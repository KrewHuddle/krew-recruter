name: krew-recruiter-app
services:
- name: krew-recruter
  build_command: npm install && npm run build
  run_command: npm start
  environment_slug: node-js
  instance_size_slug: apps-s-1vcpu-1gb
  instance_count: 1
  http_port: 8080
  routes:
  - path: /
  envs:
  - key: PORT
    value: "8080"
    scope: RUN_TIME
  - key: npm_config_prefix
    value: ""
    scope: BUILD_TIME
  - key: HOME
    value: /workspace
    scope: BUILD_TIME
